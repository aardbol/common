name: Link checker
on:
  push:
    paths:
      - '**.md'
  pull_request:
    paths:
      - '**.md'
  schedule:
    - cron: '0 0 * * *'

jobs:
  markdown-link-check:
    name: Check links in markdown
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2.8.0
        with:
          fail: true
          args: --verbose --no-progress --exclude 'aardbol-actions/common/actions/workflows' --exclude 'npmjs.com' './**/*.md' './**/*.html' './**/*.rst'
